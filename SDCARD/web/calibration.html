<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrintSense - Calibração</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --primary: #00d9ff;
        --secondary: #00ff88;
        --accent: #ff3366;
        --dark: #0a0e27;
        --darker: #050817;
        --card-bg: rgba(15, 20, 45, 0.8);
      }

      .light-mode {
        --primary: #0066ff;
        --secondary: #00aa66;
        --accent: #ff3366;
        --dark: #87611d;
        --darker: #edeaea;
        --card-bg: rgba(255, 255, 255, 0.8);
        color: #1a1a1a;
      }

      body {
        font-family: "Outfit", sans-serif;
        background: var(--darker);
        color: #e0f7ff;
        overflow-x: hidden;
        overflow-y: auto;
      }

      /* Background animado */
      .bg-gradient {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background:
          radial-gradient(ellipse at top,
            rgba(0, 217, 255, 0.15) 0%,
            transparent 50%),
          radial-gradient(ellipse at bottom,
            rgba(0, 255, 136, 0.1) 0%,
            transparent 50%);
        animation: pulse 8s ease-in-out infinite;
      }

      @keyframes pulse {
        0%, 100% {
          opacity: 1;
        }
        50% {
          opacity: 0.7;
        }
      }

      /* Grid pattern */
      .grid-bg {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        background-image:
          linear-gradient(var(--primary) 1px, transparent 1px),
          linear-gradient(90deg, var(--primary) 1px, transparent 1px);
        background-size: 40px 40px;
        opacity: 0.03;
      }

      /* Header */
      header {
        background: rgba(10, 14, 39, 0.9);
        backdrop-filter: blur(10px);
        border-bottom: 2px solid var(--primary);
        padding: 1rem 1.5rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
        gap: 1rem;
      }

      h1 {
        font-family: "Orbitron", sans-serif;
        font-size: clamp(1.2rem, 4vw, 2rem);
        background: linear-gradient(135deg, var(--primary), var(--secondary));
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        font-weight: 900;
        white-space: nowrap;
      }

      /* Menu Navigation */
      .menu {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        flex-wrap: wrap;
      }

      .menu-toggle {
        display: none;
        font-size: 1.8rem;
        background: none;
        border: none;
        color: var(--primary);
        cursor: pointer;
        padding: 0.5rem;
      }

      .container {
        max-width: 1200px;
        margin: auto;
        padding: 2rem;
      }

      .card {
        background: var(--card-bg);
        border: 1px solid rgba(0, 217, 255, 0.2);
        border-radius: 20px;
        padding: 1.5rem;
        margin-bottom: 1.5rem;
        backdrop-filter: blur(10px);
        transition: all 0.3s;
      }

      .card:hover {
        border-color: var(--primary);
        box-shadow: 0 10px 40px rgba(0, 217, 255, 0.3);
        transform: translateY(-2px);
      }

      .card h2 {
        font-family: "Orbitron", sans-serif;
        color: var(--primary);
        margin-bottom: 1rem;
        font-size: clamp(1.2rem, 3vw, 1.5rem);
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 1rem;
      }

      label {
        display: block;
        font-size: 0.9rem;
        opacity: 0.8;
        margin-bottom: 0.5rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      input {
        width: 100%;
        padding: 0.8rem;
        margin-top: 0.3rem;
        border-radius: 10px;
        border: 2px solid rgba(0, 217, 255, 0.3);
        background: rgba(10, 14, 39, 0.6);
        color: #fff;
        font-family: "JetBrains Mono", monospace;
        font-size: 1rem;
        transition: all 0.3s;
      }

      input:focus {
        outline: none;
        border-color: var(--primary);
        background: rgba(10, 14, 39, 0.9);
      }

      .btn {
        margin-top: 1.5rem;
        padding: 1rem 2rem;
        border-radius: 12px;
        border: 2px solid var(--primary);
        background: rgba(0, 217, 255, 0.1);
        color: var(--primary);
        font-weight: 600;
        cursor: pointer;
        font-family: "Outfit", sans-serif;
        font-size: 1rem;
        transition: all 0.3s;
        width: auto;
        min-width: 200px;
      }

      .btn:hover {
        background: rgba(0, 217, 255, 0.2);
        transform: translateY(-2px);
        box-shadow: 0 5px 20px rgba(0, 217, 255, 0.3);
      }

      .btn-save {
        width: 100%;
        margin-top: 2rem;
        padding: 1.2rem;
        font-size: 1.1rem;
        font-weight: 700;
      }

      /* Light mode */
      .light-mode input {
        background: #fff;
        color: #000;
        border-color: rgba(0, 0, 0, 0.2);
      }

      .light-mode .card {
        border: 1px solid rgba(0, 0, 0, 0.2);
        background: rgba(255, 255, 255, 0.9);
      }

      /* Responsive */
      @media (max-width: 768px) {
        header {
          flex-wrap: wrap;
          padding: 1rem;
        }

        h1 {
          flex: 0 0 auto;
        }

        .menu-toggle {
          display: block;
          order: 2;
          margin-left: auto;
        }

        .menu {
          order: 3;
          width: 100%;
          max-height: 0;
          overflow: hidden;
          flex-direction: column;
          gap: 0.5rem;
          transition: max-height 0.3s ease;
        }

        .menu.active {
          max-height: 200px;
          margin-top: 1rem;
        }

        .menu .btn {
          width: 100%;
        }

        .container {
          padding: 1rem;
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .card {
          padding: 1rem;
        }

        .btn-save {
          font-size: 1rem;
          padding: 1rem;
        }
      }

      @media (max-width: 480px) {
        input {
          font-size: 0.9rem;
          padding: 0.7rem;
        }

        label {
          font-size: 0.8rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="bg-gradient"></div>
    <div class="grid-bg"></div>

    <header>
      <h1>🧪 CALIBRAÇÃO</h1>
      <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">☰</button>
      <nav class="menu" id="menu">
        <button onclick="toggleTheme()" class="btn" aria-label="Alternar tema">
          🌙 / ☀️
        </button>
        <button class="btn" onclick="window.location.href = 'index.html'">
          ⬅ Voltar
        </button>
      </nav>
    </header>

    <div class="container">
      <!-- TEMPERATURA -->
      <div class="card">
        <h2>🌡️ Temperatura</h2>
        <div class="grid">
          <div>
            <label>Offset (°C)</label>
            <input type="number" id="tempOffset" step="0.1" placeholder="0.0" />
          </div>
        </div>
      </div>

      <!-- UMIDADE -->
      <div class="card">
        <h2>💧 Umidade</h2>
        <div class="grid">
          <div>
            <label>Offset (%)</label>
            <input type="number" id="humOffset" step="0.1" placeholder="0.0" />
          </div>
        </div>
      </div>

      <!-- LUZ -->
      <div class="card">
        <h2>💡 Luminosidade</h2>
        <div class="grid">
          <div>
            <label>Offset (lux)</label>
            <input type="number" id="lightOffset" step="1" placeholder="0" />
          </div>
        </div>
      </div>

      <!-- SOM -->
      <div class="card">
        <h2>🔊 Som</h2>
        <div class="grid">
          <div>
            <label>Offset (dB)</label>
            <input type="number" id="soundOffset" step="0.1" placeholder="0.0" />
          </div>
        </div>
      </div>

      <button class="btn btn-save" onclick="saveCalibration()">
        💾 Salvar Calibração
      </button>
    </div>

    <script src="/script.js"></script>
    <script>
      function toggleMenu() {
        document.getElementById("menu").classList.toggle("active");
      }

      function el(id) {
        return document.getElementById(id);
      }

      // LOAD CALIBRATION
      async function loadCalibration() {
        try {
          const res = await fetch(`${API_BASE}/api/calibration`);

          if (!res.ok) throw new Error(res.status);

          const data = await res.json();
          console.log("CALIBRATION:", data);

          el("tempOffset").value = data.tempOffset ?? 0;
          el("humOffset").value = data.humOffset ?? 0;
          el("lightOffset").value = data.lightOffset ?? 0;
          el("soundOffset").value = data.soundOffset ?? 0;
        } catch (e) {
          console.error("Erro ao carregar calibração:", e);
          alert("Erro ao carregar calibração. Verifique se o servidor está ativo.");
        }
      }

      // SAVE CALIBRATION
      async function saveCalibration() {
        const data = {
          tempOffset: Number(el("tempOffset").value),
          humOffset: Number(el("humOffset").value),
          lightOffset: Number(el("lightOffset").value),
          soundOffset: Number(el("soundOffset").value),
        };

        try {
          const res = await fetch(`${API_BASE}/api/calibration`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });

          if (!res.ok) throw new Error();

          alert("✅ Calibração salva com sucesso!");
        } catch (e) {
          console.error(e);
          alert("❌ Erro ao salvar calibração");
        }
      }

      window.addEventListener("DOMContentLoaded", () => {
        applySavedTheme();
        loadCalibration();
      });
    </script>
  </body>
</html>
