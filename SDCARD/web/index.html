<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PrintSense - Dashboard Pro</title>
  <script src="/js/chart.js"></script>
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@400;600&family=Outfit:wght@300;400;600;700&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #00d9ff;
      --secondary: #00ff88;
      --accent: #ff3366;
      --dark: #0a0e27;
      --darker: #050817;
      --card-bg: rgba(15, 20, 45, 0.8);
    }

    .light-mode {
      --primary: #0066ff;
      --secondary: #00aa66;
      --accent: #ff3366;
      --dark: #87611d;
      --darker: #edeaea;
      --card-bg: rgba(255, 255, 255, 0.8);
      color: #1a1a1a;
    }

    .light-mode select {
      color: #000;
      background: #fff !important;
      border-color: rgba(0, 0, 0, 0.2);
    }

    body {
      font-family: "Outfit", sans-serif;
      background: var(--darker);
      color: #e0f7ff;
      overflow-x: hidden;
      overflow-y: auto;
    }

    /* Skip link for accessibility */
    .skip-link {
      position: absolute;
      top: -40px;
      left: 6px;
      background: var(--primary);
      color: var(--darker);
      padding: 8px;
      text-decoration: none;
      border-radius: 4px;
      z-index: 1000;
      font-weight: 600;
      transition: top 0.3s;
    }

    .skip-link:focus {
      top: 6px;
    }

    /* Focus styles for accessibility */
    .btn:focus-visible,
    select:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 2px;
    }

    /* Improved card shadows for modernity */
    .card {
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card:hover {
      box-shadow: 0 10px 40px rgba(0, 217, 255, 0.3);
    }

    /* Background animado */
    .bg-gradient {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(ellipse at top,
          rgba(0, 217, 255, 0.15) 0%,
          transparent 50%),
        radial-gradient(ellipse at bottom,
          rgba(0, 255, 136, 0.1) 0%,
          transparent 50%);
      animation: pulse 8s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.7;
      }
    }

    /* Grid pattern */
    .grid-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: -1;
      background-image:
        linear-gradient(var(--primary) 1px, transparent 1px),
        linear-gradient(90deg, var(--primary) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.03;
    }

    /* ==================== HEADER ==================== */
    header {
      background: rgba(10, 14, 39, 0.9);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--primary);
      padding: 1rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
      gap: 1rem;
    }

    h1 {
      font-family: "Orbitron", sans-serif;
      font-size: clamp(1.2rem, 4vw, 2.5rem);
      background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      font-weight: 900;
      white-space: nowrap;
    }

    /* Menu Navigation */
    .menu {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .menu-toggle {
      display: none;
      font-size: 1.8rem;
      background: none;
      border: none;
      color: var(--primary);
      cursor: pointer;
      padding: 0.5rem;
    }

    .status-badge {
      padding: 0.5rem 1rem;
      border-radius: 50px;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.8rem;
      font-weight: 600;
      border: 2px solid var(--secondary);
      background: rgba(0, 255, 136, 0.1);
      color: var(--secondary);
      white-space: nowrap;
    }

    /* Container */
    .container {
      max-width: 1600px;
      margin: 0 auto;
      padding: 2rem;
    }

    /* Dashboard Grid */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }

    /* Cards */
    .card {
      background: var(--card-bg);
      border: 1px solid rgba(0, 217, 255, 0.2);
      border-radius: 20px;
      padding: 1.5rem;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      transition: all 0.3s ease;
      margin-bottom: 10px;
    }

    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg,
          transparent,
          rgba(0, 217, 255, 0.1),
          transparent);
      transition: left 0.5s;
    }

    .card:hover::before {
      left: 100%;
    }

    .card:hover {
      border-color: var(--primary);
      box-shadow: 0 10px 40px rgba(0, 217, 255, 0.2);
      transform: translateY(-2px);
    }

    /* Status Card */
    .status-card {
      grid-column: 1 / -1;
      text-align: center;
      padding: 2rem;
    }

    .status-card h2 {
      font-family: "Orbitron", sans-serif;
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .status-card.ideal h2 {
      background: linear-gradient(135deg, var(--secondary), #00d9ff);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-card.bom h2 {
      background: linear-gradient(135deg, #ffd700, #ff8800);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .status-card.ruim h2 {
      background: linear-gradient(135deg, var(--accent), #ff0066);
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* Metric Cards */
    .metric-card {
      text-align: center;
    }

    .metric-icon {
      font-size: 2.5rem;
      margin-bottom: 0.5rem;
    }

    .metric-label {
      font-size: 0.85rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 0.5rem;
    }

    .metric-value {
      font-family: "Orbitron", sans-serif;
      font-size: 2.5rem;
      font-weight: 900;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .metric-range {
      font-size: 0.9rem;
      opacity: 0.6;
      font-family: "JetBrains Mono", monospace;
    }

    .metric-badge {
      display: inline-block;
      padding: 0.3rem 0.8rem;
      border-radius: 15px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 0.5rem;
    }

    .metric-badge.ok {
      background: rgba(0, 255, 136, 0.2);
      color: var(--secondary);
      border: 1px solid var(--secondary);
    }

    .metric-badge.warning {
      background: rgba(255, 215, 0, 0.2);
      color: #ffd700;
      border: 1px solid #ffd700;
    }

    .metric-badge.error {
      background: rgba(255, 51, 102, 0.2);
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    /* Chart Card */
    .chart-card {
      grid-column: 1 / -1;
      min-height: 400px;
    }

    .chart-card h3 {
      font-family: "Orbitron", sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      background-clip: text;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }

    .chart-container {
      position: relative;
      height: 350px;
      width: 100%;
    }

    /* Controls Card */
    .controls-card {
      grid-column: 1 / -1;
    }

    .control-group {
      margin-bottom: 1.5rem;
    }

    .control-group:last-child {
      margin-bottom: 0;
    }

    .control-group label {
      display: block;
      font-family: "Orbitron", sans-serif;
      font-size: 0.9rem;
      margin-bottom: 0.8rem;
      opacity: 0.8;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    select {
      width: 100%;
      padding: 1rem;
      background: rgba(10, 14, 39, 0.6);
      border: 2px solid rgba(0, 217, 255, 0.3);
      border-radius: 12px;
      color: var(--primary);
      font-family: "JetBrains Mono", monospace;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
    }

    select:hover,
    select:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(10, 14, 39, 0.9);
    }

    /* Buttons */
    .btn-group {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .btn {
      flex: 1;
      min-width: 160px;
      padding: 1rem;
      border: none;
      border-radius: 12px;
      font-family: "Outfit", sans-serif;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      position: relative;
      overflow: hidden;
    }

    .btn::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.3);
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    .btn:hover::before {
      width: 300px;
      height: 300px;
    }

    .btn span {
      position: relative;
      z-index: 1;
    }

    .btn-primary {
      background: rgba(0, 217, 255, 0.1);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-primary:hover {
      background: rgba(0, 217, 255, 0.2);
    }

    .btn-secondary {
      background: rgba(0, 217, 255, 0.1);
      color: var(--primary);
      border: 2px solid var(--primary);
    }

    .btn-secondary:hover {
      background: rgba(0, 217, 255, 0.2);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 2rem;
      opacity: 0.6;
      font-family: "JetBrains Mono", monospace;
      font-size: 0.9rem;
    }

    /* Modal Content */
    .modal-content {
      background: var(--card-bg);
      color: #e0f7ff;
    }

    body.light-mode .modal-content {
      background: var(--darker);
      color: #1a1a1a;
    }

    body:not(.light-mode) .modal-content {
      background: var(--card-bg);
      color: #e0f7ff;
    }

    /* ==================== RESPONSIVO ==================== */
    @media (max-width: 768px) {
      /* Header responsivo */
      header {
        flex-wrap: wrap;
        padding: 1rem;
      }

      h1 {
        flex: 0 0 auto;
      }

      .menu-toggle {
        display: block;
        order: 2;
        margin-left: auto;
      }

      .menu {
        order: 3;
        width: 100%;
        max-height: 0;
        overflow: hidden;
        flex-direction: column;
        gap: 0.5rem;
        transition: max-height 0.3s ease;
      }

      .menu.active {
        max-height: 400px;
        margin-top: 1rem;
      }

      .menu .btn {
        width: 100%;
        min-width: 100%;
      }

      .status-badge {
        width: 100%;
        text-align: center;
      }

      /* Dashboard grid */
      .dashboard-grid {
        grid-template-columns: 1fr;
      }

      .chart-card {
        grid-column: 1;
      }

      /* Container */
      .container {
        padding: 1rem;
      }

      /* Metric values */
      .metric-value {
        font-size: 2rem;
      }

      .metric-icon {
        font-size: 2rem;
      }

      /* Button group */
      .btn-group {
        flex-direction: column;
      }

      .btn {
        min-width: 100%;
      }

      /* Chart */
      .chart-container {
        height: 250px;
      }
    }

    @media (max-width: 480px) {
      h1 {
        font-size: 1.2rem;
      }

      .status-card h2 {
        font-size: 1.5rem;
      }

      .metric-value {
        font-size: 1.8rem;
      }

      .status-badge {
        font-size: 0.7rem;
        padding: 0.4rem 0.8rem;
      }

      .btn {
        font-size: 0.9rem;
        padding: 0.8rem;
      }
    }
  </style>
</head>

<body>
  <a href="#main-content" class="skip-link">Pular para conteúdo principal</a>
  <div class="bg-gradient"></div>
  <div class="grid-bg"></div>

  <header>
    <h1>🖨️ PRINTSENSE</h1>
    <button class="menu-toggle" onclick="toggleMenu()" aria-label="Menu">☰</button>
    <nav class="menu" id="menu">
      <button onclick="toggleTheme()" class="btn btn-secondary">🌙 / ☀️</button>
      <button onclick="window.location.href='calibration.html'" class="btn btn-primary">🧪 Calibração</button>
      <button onclick="window.location.href='config.html'" class="btn btn-primary">⚙️ Configuração</button>
      <button onclick="window.location.href='about.html'" class="btn btn-primary">ℹ️ Sobre</button>
      <div class="status-badge">
        <span id="connectionStatus">● ONLINE</span>
      </div>
    </nav>
  </header>

  <main id="main-content" class="container">
    <!-- Seletor de Material -->
    <div class="card controls-card">
      <div class="control-group">
        <label for="materialSelect">🎯 MATERIAL SELECIONADO</label>
        <select id="materialSelect" onchange="changeMaterial()">
          <option value="PLA">PLA</option>
          <option value="PETG">PETG</option>
          <option value="ABS">ABS</option>
          <option value="RESINA">Resina</option>
        </select>
      </div>
    </div>

    <!-- Status Geral -->
    <div class="card status-card ideal" id="statusCard">
      <h2 id="statusTitle">CARREGANDO...</h2>
      <p id="statusDetails">Aguarde enquanto coletamos dados dos sensores</p>
    </div>

    <!-- Métricas -->
    <div class="dashboard-grid">
      <!-- Temperatura -->
      <div class="card metric-card">
        <div class="metric-icon">🌡️</div>
        <div class="metric-label">Temperatura</div>
        <div class="metric-value" id="temperature">--</div>
        <div class="metric-range" id="tempRange">Ideal: --</div>
        <span class="metric-badge ok" id="tempBadge">OK</span>
      </div>

      <!-- Umidade -->
      <div class="card metric-card">
        <div class="metric-icon">💧</div>
        <div class="metric-label">Umidade</div>
        <div class="metric-value" id="humidity">--</div>
        <div class="metric-range" id="humRange">Ideal: --</div>
        <span class="metric-badge ok" id="humBadge">OK</span>
      </div>

      <!-- Luminosidade -->
      <div class="card metric-card">
        <div class="metric-icon">💡</div>
        <div class="metric-label">Luminosidade</div>
        <div class="metric-value" id="light">--</div>
        <div class="metric-range" id="lightRange">< 3000 lux</div>
        <span class="metric-badge ok" id="lightBadge">OK</span>
      </div>

      <!-- Ruído -->
      <div class="card metric-card">
        <div class="metric-icon">🔊</div>
        <div class="metric-label">Ruído</div>
        <div class="metric-value" id="sound">--</div>
        <div class="metric-range" id="soundRange">< 2000</div>
        <span class="metric-badge ok" id="soundBadge">OK</span>
      </div>
    </div>

    <!-- Gráficos -->
    <div class="card chart-card">
      <h3>📊 HISTÓRICO EM TEMPO REAL</h3>
      <div class="chart-container">
        <canvas id="historyChart"></canvas>
      </div>
    </div>

    <!-- Controles -->
    <div class="card controls-card">
      <div class="control-group">
        <label>🎛️ AÇÕES</label>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="showLogs()">
            <span>📁 Ver Logs</span>
          </button>
          <button class="btn btn-secondary" onclick="downloadToday()">
            <span>⬇️ Download Hoje</span>
          </button>
        </div>
      </div>
    </div>

    <div class="footer">
      <p>Última atualização: <span id="lastUpdate">--</span></p>
    </div>
  </main>

  <script src="/script.js"></script>
</body>

</html>
